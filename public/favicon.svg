<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a35"/>
      <stop offset="100%" stop-color="#11111B"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4a57"/>
      <stop offset="100%" stop-color="#ff8f98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5" flood-color="#000000" />
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="25" fill="url(#bgGradient)" />
  <rect width="100" height="100" rx="25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  
  <text 
    x="50" 
    y="68" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
    font-weight="800" 
    font-size="52" 
    fill="url(#textGradient)" 
    text-anchor="middle"
    filter="url(#shadow)"
  >DS</text>
</svg>